description = "Open or build the shared Lavish plan (wfw plan)"
prompt = """
Run workflowWrapper plan.

User request: {{args}}

If the user provided text:
1. Queue the prompt:
!{wfw plan {{args}}}
2. Build or update the team Lavish HTML artifact per the lavish skill.
3. Open and poll for feedback:
!{wfw plan}

If no prompt text, open and poll:
!{wfw plan}

After poll feedback, apply changes, then post your reply and poll again:
!{wfw plan --reply "<summary of changes>"}

Do not end the turn during an active Lavish review without running wfw plan or wfw plan --reply.
"""
